<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f2f2f2;
        }

        /* Top gradient bar */
        .topbar {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: linear-gradient(0deg, #0068e0, #8e2de2);
        }

        /* Centered login box */
        .login-box {
            background: white;
            width: 90%;
            max-width: 350px;

            /* PERFECT CENTERING */
            margin: 60px auto 0 auto;

            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);

            /* FIX INTERNAL ALIGNMENT */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        /* Login button */
        button {
            width: 100%;
            padding: 12px;
            background: #0068e0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #0052b3;
        }
    </style>
</head>
<body>

<div class="topbar">Login</div>

<div class="login-box">
    <h2 style="text-align:center; margin-top:0;">Welcome</h2>

    <input id="username" type="text" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (user === "" || pass === "") {
        alert("Please enter both fields");
        return;
    }

    // Redirect to stock page
    window.location.href = "stock.html";
}
</script>

</body>
</html>
